<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — Aurum Grand Hotel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    :root {
      --gold: #C9A84C;
      --gold-light: #e8c96a;
      --dark: #0D0D0D;
      --dark-mid: #1a1a1a;
      --dark-card: #141414;
      --cream: #F5EDD6;
      --text-muted: #888;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--dark);
      font-family: 'Jost', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      overflow-x: hidden;
    }

    /* LEFT PANEL */
    .left-panel {
      flex: 1;
      background: url('https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?w=1200&q=80') center/cover no-repeat;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 3rem;
      min-height: 100vh;
    }
    .left-panel::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.75) 100%);
    }
    .left-panel-content { position: relative; z-index: 1; }
    .brand-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 2px;
      text-decoration: none;
      display: inline-block;
      margin-bottom: 1rem;
    }
    .brand-logo span { color: var(--gold); }
    .left-tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.8rem;
      font-weight: 300;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 1rem;
    }
    .left-tagline strong { color: var(--gold); font-weight: 600; }
    .left-desc {
      color: rgba(255,255,255,0.65);
      font-size: 0.95rem;
      letter-spacing: 0.5px;
      max-width: 340px;
    }
    .divider-gold {
      width: 48px; height: 2px;
      background: var(--gold);
      margin: 1.2rem 0;
    }

    /* RIGHT PANEL */
    .right-panel {
      width: 480px;
      background: var(--dark-card);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 3rem 2.8rem;
      position: relative;
      overflow-y: auto;
    }
    .right-panel::before {
      content: '';
      position: absolute;
      left: 0; top: 15%; bottom: 15%;
      width: 1px;
      background: linear-gradient(to bottom, transparent, var(--gold), transparent);
    }
    .form-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 0.3rem;
    }
    .form-sub {
      color: var(--text-muted);
      font-size: 0.88rem;
      margin-bottom: 2rem;
      letter-spacing: 0.3px;
    }
    .form-label {
      color: rgba(255,255,255,0.7);
      font-size: 0.78rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }
    .form-control, .form-select {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      border-radius: 2px;
      padding: 0.7rem 1rem;
      font-family: 'Jost', sans-serif;
      font-size: 0.92rem;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .form-control:focus, .form-select:focus {
      background: rgba(255,255,255,0.06);
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.12);
      color: #fff;
      outline: none;
    }
    .form-control::placeholder { color: rgba(255,255,255,0.25); }
    .form-select option { background: #1a1a1a; color: #fff; }
    .input-icon-wrap { position: relative; }
    .input-icon-wrap .bi {
      position: absolute; right: 1rem; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); font-size: 0.9rem; pointer-events: none;
    }
    .password-toggle {
      position: absolute; right: 1rem; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); cursor: pointer; font-size: 0.9rem; background: none; border: none;
      transition: color 0.2s;
    }
    .password-toggle:hover { color: var(--gold); }

    .btn-gold {
      background: var(--gold);
      color: var(--dark);
      border: none;
      border-radius: 2px;
      font-family: 'Jost', sans-serif;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-size: 0.82rem;
      padding: 0.85rem 2rem;
      width: 100%;
      transition: background 0.3s, transform 0.2s, box-shadow 0.3s;
      cursor: pointer;
      margin-top: 0.5rem;
    }
    .btn-gold:hover {
      background: var(--gold-light);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(201,168,76,0.3);
    }
    .divider-text {
      display: flex; align-items: center; gap: 1rem;
      color: var(--text-muted); font-size: 0.78rem; margin: 1.4rem 0;
      letter-spacing: 1px;
    }
    .divider-text::before, .divider-text::after {
      content: ''; flex: 1; height: 1px;
      background: rgba(255,255,255,0.08);
    }
    .social-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.75);
      border-radius: 2px;
      padding: 0.6rem;
      font-size: 1.1rem;
      transition: all 0.3s; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      font-family: 'Jost', sans-serif; font-size: 0.82rem;
      letter-spacing: 0.5px;
      flex: 1;
    }
    .social-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.05); }
    .login-link {
      color: var(--text-muted); font-size: 0.85rem; text-align: center; margin-top: 1.5rem;
    }
    .login-link a { color: var(--gold); text-decoration: none; font-weight: 500; }
    .login-link a:hover { text-decoration: underline; }
    .form-check-input { background-color: transparent; border-color: rgba(255,255,255,0.2); }
    .form-check-input:checked { background-color: var(--gold); border-color: var(--gold); }
    .form-check-label { color: rgba(255,255,255,0.55); font-size: 0.82rem; }
    .form-check-label a { color: var(--gold); text-decoration: none; }

    /* Animated entrance */
    .right-panel > * { animation: fadeUp 0.6s both; }
    .right-panel > *:nth-child(1) { animation-delay: 0.05s; }
    .right-panel > *:nth-child(2) { animation-delay: 0.1s; }
    .right-panel > *:nth-child(3) { animation-delay: 0.15s; }
    .right-panel > *:nth-child(4) { animation-delay: 0.2s; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .step-dots { display: flex; gap: 6px; margin-bottom: 1.8rem; }
    .step-dot {
      width: 28px; height: 3px; border-radius: 2px;
      background: rgba(255,255,255,0.1);
      transition: background 0.3s;
    }
    .step-dot.active { background: var(--gold); }

    @media (max-width: 900px) {
      .left-panel { display: none; }
      .right-panel { width: 100%; padding: 2.5rem 1.8rem; }
      .right-panel::before { display: none; }
    }
  </style>
</head>
<body>
  <!-- LEFT PANEL -->
  <div class="left-panel">
    <div class="left-panel-content">
      <a href="home.html" class="brand-logo">AURUM <span>GRAND</span></a>
      <div class="divider-gold"></div>
      <div class="left-tagline">Begin Your<br><strong>Luxury Journey</strong></div>
      <p class="left-desc">Create your account and unlock exclusive member rates, priority booking, and bespoke concierge services.</p>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="step-dots">
      <div class="step-dot active"></div>
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
    </div>

    <div class="form-heading">Create Account</div>
    <div class="form-sub">Join the Aurum membership — it's complimentary.</div>

    <form action="home.html">
      <div class="row g-3">
        <!-- Name Row -->
        <div class="col-6">
          <label class="form-label">First Name</label>
          <div class="input-icon-wrap">
            <input type="text" class="form-control" placeholder="James" />
            <i class="bi bi-person"></i>
          </div>
        </div>
        <div class="col-6">
          <label class="form-label">Last Name</label>
          <div class="input-icon-wrap">
            <input type="text" class="form-control" placeholder="Morrison" />
          </div>
        </div>

        <!-- Email -->
        <div class="col-12">
          <label class="form-label">Email Address</label>
          <div class="input-icon-wrap">
            <input type="email" class="form-control" placeholder="james@example.com" />
            <i class="bi bi-envelope"></i>
          </div>
        </div>

        <!-- Phone -->
        <div class="col-12">
          <label class="form-label">Phone Number</label>
          <div class="input-icon-wrap">
            <input type="tel" class="form-control" placeholder="+91 98765 43210" />
            <i class="bi bi-phone"></i>
          </div>
        </div>

        <!-- Nationality -->
        <div class="col-12">
          <label class="form-label">Nationality</label>
          <select class="form-select">
            <option value="" disabled selected>Select country</option>
            <option>India</option>
            <option>United States</option>
            <option>United Kingdom</option>
            <option>UAE</option>
            <option>France</option>
            <option>Germany</option>
            <option>Japan</option>
            <option>Australia</option>
          </select>
        </div>

        <!-- Password -->
        <div class="col-12">
          <label class="form-label">Password</label>
          <div class="input-icon-wrap">
            <input type="password" class="form-control" placeholder="Create a strong password" id="pwd1" />
            <button type="button" class="password-toggle" onclick="togglePwd('pwd1','eye1')">
              <i class="bi bi-eye" id="eye1"></i>
            </button>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="col-12">
          <label class="form-label">Confirm Password</label>
          <div class="input-icon-wrap">
            <input type="password" class="form-control" placeholder="Repeat your password" id="pwd2" />
            <button type="button" class="password-toggle" onclick="togglePwd('pwd2','eye2')">
              <i class="bi bi-eye" id="eye2"></i>
            </button>
          </div>
        </div>

        <!-- Terms -->
        <div class="col-12">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="terms" />
            <label class="form-check-label" for="terms">
              I agree to the <a href="#">Terms of Service</a> &amp; <a href="#">Privacy Policy</a>
            </label>
          </div>
        </div>

        <!-- Submit -->
        <div class="col-12">
          <button type="submit" class="btn-gold">Create My Account</button>
        </div>
      </div>
    </form>

    <div class="divider-text">OR SIGN UP WITH</div>
    <div class="d-flex gap-2">
      <button class="social-btn"><i class="bi bi-google"></i> Google</button>
      <button class="social-btn"><i class="bi bi-apple"></i> Apple</button>
      <button class="social-btn"><i class="bi bi-facebook"></i> Facebook</button>
    </div>

    <div class="login-link">Already a member? <a href="login.html">Sign in here</a></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function togglePwd(id, iconId) {
      const input = document.getElementById(id);
      const icon = document.getElementById(iconId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
      }
    }
  </script>
</body>
</html>
