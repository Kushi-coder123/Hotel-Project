<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Aurum Grand Hotel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    :root {
      --gold: #C9A84C;
      --gold-light: #e8c96a;
      --dark: #0D0D0D;
      --dark-card: #141414;
      --cream: #F5EDD6;
      --text-muted: #888;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--dark);
      font-family: 'Jost', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: stretch;
    }

    /* LEFT PANEL */
    .left-panel {
      flex: 1;
      background: url('https://images.unsplash.com/photo-1571896349842-33c89424de2d?w=1200&q=80') center/cover no-repeat;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 3rem;
      min-height: 100vh;
    }
    .left-panel::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(160deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%);
    }
    .lp-top, .lp-bottom { position: relative; z-index: 1; }

    .brand-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 3px;
      text-decoration: none;
    }
    .brand-logo span { color: var(--gold); }


    .divider-gold { width: 48px; height: 2px; background: var(--gold); margin: 1.2rem 0; }
    .lp-quote {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.4rem;
      font-weight: 300;
      color: #fff;
      line-height: 1.25;
      margin-bottom: 1rem;
    }
    .lp-quote em { color: var(--gold); font-style: italic; }
    .lp-attr {
      color: rgba(255,255,255,0.45);
      font-size: 0.82rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .amenity-badges {
      display: flex; gap: 0.6rem; flex-wrap: wrap; margin-top: 2rem;
    }
    .amenity-badge {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.7);
      border-radius: 100px;
      padding: 0.3rem 0.9rem;
      font-size: 0.75rem;
      letter-spacing: 0.5px;
    }

    /* RIGHT PANEL */
    .right-panel {
      width: 460px;
      background: var(--dark-card);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 3.5rem 2.8rem;
      position: relative;
    }
    .right-panel::before {
      content: '';
      position: absolute; left: 0; top: 20%; bottom: 20%;
      width: 1px;
      background: linear-gradient(to bottom, transparent, var(--gold), transparent);
    }

    .form-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem; font-weight: 600;
      color: #fff; margin-bottom: 0.3rem;
    }
    .form-sub { color: var(--text-muted); font-size: 0.88rem; margin-bottom: 2.2rem; }

    .form-label {
      color: rgba(255,255,255,0.65);
      font-size: 0.75rem;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-bottom: 0.45rem;
    }
    .form-control {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      border-radius: 2px;
      padding: 0.75rem 1rem;
      font-family: 'Jost', sans-serif;
      font-size: 0.92rem;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .form-control:focus {
      background: rgba(255,255,255,0.06);
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.12);
      color: #fff; outline: none;
    }
    .form-control::placeholder { color: rgba(255,255,255,0.2); }
    .input-icon-wrap { position: relative; }
    .input-icon-wrap .bi {
      position: absolute; right: 1rem; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); font-size: 0.88rem; pointer-events: none;
    }
    .password-toggle {
      position: absolute; right: 1rem; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); cursor: pointer; background: none; border: none;
      transition: color 0.2s;
    }
    .password-toggle:hover { color: var(--gold); }

    .forgot-link { color: var(--gold); font-size: 0.8rem; text-decoration: none; }
    .forgot-link:hover { text-decoration: underline; }

    .btn-gold {
      background: var(--gold); color: var(--dark); border: none; border-radius: 2px;
      font-family: 'Jost', sans-serif; font-weight: 500;
      letter-spacing: 2px; text-transform: uppercase; font-size: 0.8rem;
      padding: 0.9rem 2rem; width: 100%;
      transition: background 0.3s, transform 0.2s, box-shadow 0.3s; cursor: pointer;
    }
    .btn-gold:hover {
      background: var(--gold-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(201,168,76,0.35);
    }

    .divider-text {
      display: flex; align-items: center; gap: 1rem;
      color: var(--text-muted); font-size: 0.75rem; margin: 1.5rem 0;
      letter-spacing: 1px;
    }
    .divider-text::before, .divider-text::after {
      content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.08);
    }

    .social-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7); border-radius: 2px;
      padding: 0.65rem 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      font-family: 'Jost', sans-serif; font-size: 0.82rem; flex: 1;
      transition: all 0.3s; letter-spacing: 0.3px;
    }
    .social-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.05); }

    .register-link { color: var(--text-muted); font-size: 0.85rem; text-align: center; margin-top: 1.8rem; }
    .register-link a { color: var(--gold); text-decoration: none; font-weight: 500; }

    .form-check-input:checked { background-color: var(--gold); border-color: var(--gold); }
    .form-check-label { color: rgba(255,255,255,0.5); font-size: 0.82rem; }

    /* Pulse ring on submit btn */
    @keyframes pulseRing {
      0% { box-shadow: 0 0 0 0 rgba(201,168,76,0.4); }
      70% { box-shadow: 0 0 0 12px rgba(201,168,76,0); }
      100% { box-shadow: 0 0 0 0 rgba(201,168,76,0); }
    }
    .btn-gold:focus { animation: pulseRing 0.8s ease-out; }

    /* Entrance animations */
    .anim { animation: slideIn 0.55s cubic-bezier(0.16,1,0.3,1) both; }
    .anim:nth-child(1) { animation-delay: 0.05s; }
    .anim:nth-child(2) { animation-delay: 0.1s; }
    .anim:nth-child(3) { animation-delay: 0.15s; }
    .anim:nth-child(4) { animation-delay: 0.22s; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @media (max-width: 900px) {
      .left-panel { display: none; }
      .right-panel { width: 100%; padding: 2.5rem 1.8rem; }
      .right-panel::before { display: none; }
    }
  </style>
</head>
<body>
  <!-- LEFT PANEL -->
  <div class="left-panel">
    <div class="lp-top">
      <a href="home.html" class="brand-logo">AURUM <span>GRAND</span></a>
    </div>
    <div class="lp-bottom">
      <div class="divider-gold"></div>
      <div class="lp-quote">"Where <em>luxury</em><br>meets legacy."</div>
      <div class="lp-attr">— Aurum Grand, Est. 1985</div>
      <div class="amenity-badges">
        <span class="amenity-badge"><i class="bi bi-star-fill me-1" style="color:var(--gold);font-size:0.65rem;"></i>5-Star Rated</span>
        <span class="amenity-badge">🏊 Infinity Pool</span>
        <span class="amenity-badge">🍽 Fine Dining</span>
        <span class="amenity-badge">💆 Spa & Wellness</span>
        <span class="amenity-badge">🚗 Valet Parking</span>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="anim">
      <div class="form-heading">Welcome Back</div>
      <div class="form-sub">Sign in to manage your stays and preferences.</div>
    </div>

    <form action="home.html" class="anim">
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <div class="input-icon-wrap">
          <input type="email" class="form-control" placeholder="your@email.com" />
          <i class="bi bi-envelope"></i>
        </div>
      </div>

      <div class="mb-2">
        <label class="form-label">Password</label>
        <div class="input-icon-wrap">
          <input type="password" class="form-control" placeholder="Enter your password" id="loginPwd" />
          <button type="button" class="password-toggle" onclick="togglePwd()">
            <i class="bi bi-eye" id="pwdIcon"></i>
          </button>
        </div>
      </div>

      <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="form-check mb-0">
          <input class="form-check-input" type="checkbox" id="remember" />
          <label class="form-check-label" for="remember">Remember me</label>
        </div>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <button type="submit" class="btn-gold">Sign In</button>
    </form>

    <div class="divider-text anim">OR CONTINUE WITH</div>

    <div class="d-flex gap-2 anim">
      <button class="social-btn"><i class="bi bi-google"></i> Google</button>
      <button class="social-btn"><i class="bi bi-apple"></i> Apple</button>
    </div>

    <div class="register-link anim">
      New to Aurum? <a href="signup.html">Create a free account</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function togglePwd() {
      const input = document.getElementById('loginPwd');
      const icon = document.getElementById('pwdIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
      }
    }
  </script>
</body>
</html>
